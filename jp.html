<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiTAP 智能維護終端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-950 p-3 md:p-6 min-h-screen text-slate-100 flex flex-col">

  <div class="max-w-5xl mx-auto w-full bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 p-4 md:p-6 flex-1 flex flex-col">
    <div class="flex border-b border-slate-800 mb-6">
      <button onclick="switchTab('input-tab')" id="btn-input-tab" class="flex-1 py-3 text-center text-sm font-bold border-b-2 border-blue-500 text-blue-400 focus:outline-none transition">
        📝 數據輸入填報
      </button>
      <button onclick="switchTab('history-tab')" id="btn-history-tab" class="flex-1 py-3 text-center text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 focus:outline-none transition">
        📊 歷史數據看板
      </button>
    </div>

    <div id="input-tab" class="tab-content active max-w-md mx-auto w-full space-y-5">
      <form id="pmForm" onsubmit="handleFormSubmit(event)" class="space-y-5">
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-inner">
          <h3 class="text-xs font-bold text-blue-400 tracking-wider mb-3">一、基本資訊</h3>
          <div class="space-y-3">
            <div>
              <label class="block text-xs text-slate-400 mb-1">Tool 編號</label>
              <select id="tool" name="tool" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none" required>
                <option value="">正在連線後端 API...</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-slate-400 mb-1">PM 日期</label>
              <input type="date" id="pmDate" name="pmDate" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none" required>
            </div>
          </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-inner">
          <h3 class="text-xs font-bold text-blue-400 tracking-wider mb-3">二、Parts 更換</h3>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div><label class="block text-xs text-slate-400 mb-1">模組</label><input type="text" name="partsModule" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">STD</label><input type="text" name="partsStd" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
          </div>
          <div class="mb-3"><label class="block text-xs text-slate-400 mb-1">MOA晶片</label><input type="text" name="partsMoaChip" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none" placeholder="❌"></div>
          <div><label class="block text-xs text-slate-400 mb-1">其他</label><input type="text" name="partsOther" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-inner">
          <h3 class="text-xs font-bold text-blue-400 tracking-wider mb-3">三、Sensor & 壓力</h3>
          <div class="mb-3"><label class="block text-xs text-slate-400 mb-1">Service Report</label><input type="text" name="serviceReport" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div><label class="block text-xs text-slate-400 mb-1">Sensor Count</label><input type="text" name="sensorCount" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">Sensor HR</label><input type="text" name="sensorHr" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <div><label class="block text-xs text-slate-400 mb-1">STD (psi)</label><input type="number" name="stdPsi" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">Viewer (sec)</label><input type="number" name="viewerPress" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">N2調壓</label><input type="text" name="n2Press" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
          </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-inner">
          <h3 class="text-xs font-bold text-blue-400 tracking-wider mb-3">四、Manifold 流道 & Pump</h3>
          <div class="grid grid-cols-3 gap-2 mb-3">
            <div><label class="block text-xs text-slate-400 mb-1">Flow 1</label><input type="text" name="manifoldFlow1" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">Flow 2</label><input type="text" name="manifoldFlow2" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">Flow 3</label><input type="text" name="manifoldFlow3" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
          </div>
          <div><label class="block text-xs text-slate-400 mb-1">MOA Pump 狀態</label><input type="text" name="moaPump" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none" placeholder="ok"></div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-inner">
          <h3 class="text-xs font-bold text-blue-400 tracking-wider mb-3">五、MITAP 環境數據</h3>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div><label class="block text-xs text-slate-400 mb-1">RH (%)</label><input type="text" name="mitapRh" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">Temp (°C)</label><input type="text" name="mitapTemp" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <div><label class="block text-xs text-slate-400 mb-1">GC1</label><input type="text" name="mitapGc1" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">GC3</label><input type="text" name="mitapGc3" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
            <div><label class="block text-xs text-slate-400 mb-1">3WAY</label><input type="text" name="mitap3way" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none"></div>
          </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-inner">
          <h3 class="text-xs font-bold text-blue-400 tracking-wider mb-3">六、異常與備註說明</h3>
          <textarea name="note" rows="2" class="w-full p-2.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:border-blue-500 focus:outline-none" placeholder="填寫異常狀況..."></textarea>
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl text-sm transition shadow-lg cursor-pointer active:scale-[0.99]">
          同步數據至雲端資料庫
        </button>
      </form>
      <div id="resultMessage" class="mt-4 p-3 text-sm rounded-xl hidden text-center font-medium border"></div>
    </div>

    <div id="history-tab" class="tab-content flex-1 flex flex-col">
      <div class="flex items-center justify-between mb-4">
        <p class="text-xs text-slate-400">滑動可橫向檢視完整欄位數據</p>
        <button onclick="loadHistoryData()" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-700 text-blue-400 font-medium cursor-pointer">
          🔄 重新整理
        </button>
      </div>

      <div class="overflow-x-auto border border-slate-800 rounded-xl shadow-inner bg-slate-950 flex-1 min-h-[300px]">
        <table class="w-full text-left border-collapse text-xs whitespace-nowrap">
          <thead class="bg-slate-800 sticky top-0 border-b border-slate-700 text-slate-300 font-bold">
            <tr>
              <th class="p-3 border-r border-slate-700">Site</th>
              <th class="p-3 border-r border-slate-700">Tool</th>
              <th class="p-3 border-r border-slate-700">PM日期</th>
              <th class="p-3">更換模組</th>
              <th class="p-3">更換STD</th>
              <th class="p-3">MOA晶片</th>
              <th class="p-3">其他更換</th>
              <th class="p-3">Service Rep.</th>
              <th class="p-3">Sensor Count</th>
              <th class="p-3">Sensor HR</th>
              <th class="p-3">STD (psi)</th>
              <th class="p-3">Viewer (sec)</th>
              <th class="p-3">N2調壓</th>
              <th class="p-3">Flow 1</th>
              <th class="p-3">Flow 2</th>
              <th class="p-3">Flow 3</th>
              <th class="p-3">MOA Pump</th>
              <th class="p-3">RH (%)</th>
              <th class="p-3">Temp (°C)</th>
              <th class="p-3">GC1</th>
              <th class="p-3">GC3</th>
              <th class="p-3">3WAY</th>
              <th class="p-3">備註</th>
            </tr>
          </thead>
          <tbody id="historyTableBody" class="divide-y divide-slate-850/60 text-slate-300">
            <tr>
              <td colspan="23" class="p-8 text-center text-slate-500">正在讀取歷史紀錄...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw9Wslm3mW1vNmyKn8mpGcUzxpP1_3S1hg2c-REE1Vn6_I30F1iglO-sO7n1UE2HTGm/exec";

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      
      document.getElementById('btn-input-tab').className = tabId === 'input-tab' ? 'flex-1 py-3 text-center text-sm font-bold border-b-2 border-blue-500 text-blue-400 focus:outline-none' : 'flex-1 py-3 text-center text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 focus:outline-none';
      document.getElementById('btn-history-tab').className = tabId === 'history-tab' ? 'flex-1 py-3 text-center text-sm font-bold border-b-2 border-blue-500 text-blue-400 focus:outline-none' : 'flex-1 py-3 text-center text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 focus:outline-none';
      
      if (tabId === 'history-tab') {
        loadHistoryData();
      }
    }

    window.addEventListener('load', function() {
      document.getElementById('pmDate').value = new Date().toISOString().split('T')[0];
      
      fetch(GAS_API_URL)
        .then(res => {
          if (!res.ok) throw new Error('HTTP status ' + res.status);
          return res.json();
        })
        .then(tools => {
          const select = document.getElementById('tool');
          select.innerHTML = '<option value="">請選擇 Tool 編號</option>';
          tools.forEach(tool => {
            select.innerHTML += `<option value="${tool}">${tool}</option>`;
          });
        })
        .catch(err => {
          document.getElementById('tool').innerHTML = `<option value="">連線錯誤原因: ${err.message}</option>`;
        });
    });

    function loadHistoryData() {
      const tbody = document.getElementById('historyTableBody');
      tbody.innerHTML = '<tr><td colspan="23" class="p-8 text-center text-slate-400 animate-pulse">正在從試算表資料庫同步數據...</td></tr>';
      
      fetch(`${GAS_API_URL}?action=getRecords`)
        .then(res => {
          if (!res.ok) throw new Error('HTTP status ' + res.status);
          return res.json();
        })
        .then(records => {
          if (records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="23" class="p-8 text-center text-slate-500">工作表內尚無數據</td></tr>';
            return;
          }
          tbody.innerHTML = '';
          records.forEach(r => {
            const rowClass = r.pmDate ? 'hover:bg-slate-800/50 bg-slate-900/40' : 'hover:bg-slate-800/30 text-slate-500';
            tbody.innerHTML += `
              <tr class="${rowClass}">
                <td class="p-3 border-r border-slate-700 font-bold text-slate-400">${r.site}</td>
                <td class="p-3 border-r border-slate-700 font-bold text-blue-400">${r.tool}</td>
                <td class="p-3 border-r border-slate-700 text-emerald-400">${r.pmDate || '-'}</td>
                <td class="p-3">${r.partsModule || '-'}</td>
                <td class="p-3">${r.partsStd || '-'}</td>
                <td class="p-3 text-center">${r.partsMoaChip || '-'}</td>
                <td class="p-3">${r.partsOther || '-'}</td>
                <td class="p-3">${r.serviceReport || '-'}</td>
                <td class="p-3">${r.sensorCount || '-'}</td>
                <td class="p-3">${r.sensorHr || '-'}</td>
                <td class="p-3">${r.stdPsi || '-'}</td>
                <td class="p-3">${r.viewerPress || '-'}</td>
                <td class="p-3">${r.n2Press || '-'}</td>
                <td class="p-3">${r.manifoldFlow1 || '-'}</td>
                <td class="p-3">${r.manifoldFlow2 || '-'}</td>
                <td class="p-3">${r.manifoldFlow3 || '-'}</td>
                <td class="p-3">${r.moaPump || '-'}</td>
                <td class="p-3">${r.mitapRh || '-'}</td>
                <td class="p-3">${r.mitapTemp || '-'}</td>
                <td class="p-3">${r.mitapGc1 || '-'}</td>
                <td class="p-3">${r.mitapGc3 || '-'}</td>
                <td class="p-3">${r.mitap3way || '-'}</td>
                <td class="p-3 max-w-xs truncate text-amber-400" title="${r.note}">${r.note || '-'}</td>
              </tr>
            `;
          });
        })
        .catch(err => {
          tbody.innerHTML = `<tr><td colspan="23" class="p-8 text-center text-rose-400">讀取失敗: ${err.message}</td></tr>`;
        });
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      const form = document.getElementById('pmForm');
      const submitBtn = document.getElementById('submitBtn');
      const resultDiv = document.getElementById('resultMessage');
      
      submitBtn.disabled = true;
      submitBtn.textContent = '數據傳輸中...';

      const formData = {
        tool: form.tool.value, pmDate: form.pmDate.value, partsModule: form.partsModule.value,
        partsStd: form.partsStd.value, partsMoaChip: form.partsMoaChip.value, partsOther: form.partsOther.value,
        serviceReport: form.serviceReport.value, sensorCount: form.sensorCount.value, sensorHr: form.sensorHr.value,
        stdPsi: form.stdPsi.value, viewerPress: form.viewerPress.value, n2Press: form.n2Press.value,
        manifoldFlow1: form.manifoldFlow1.value, manifoldFlow2: form.manifoldFlow2.value, manifoldFlow3: form.manifoldFlow3.value,
        moaPump: form.moaPump.value, mitapRh: form.mitapRh.value, mitapTemp: form.mitapTemp.value,
        mitapGc1: form.mitapGc1.value, mitapGc3: form.mitapGc3.value, mitap3way: form.mitap3way.value, note: form.note.value
      };

      fetch(GAS_API_URL, {
        method: 'POST',
        mode: 'cors',
        body: JSON.stringify(formData),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      })
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(res => {
        submitBtn.disabled = false;
        submitBtn.textContent = '同步數據至雲端資料庫';
        resultDiv.classList.remove('hidden');
        
        if (res.status === 'success') {
          resultDiv.className = 'mt-4 p-3 text-sm rounded-xl text-center bg-emerald-950 text-emerald-300 border-emerald-800/60';
          resultDiv.textContent = res.message;
          form.reset();
          document.getElementById('pmDate').value = new Date().toISOString().split('T')[0];
        } else {
          resultDiv.className = 'mt-4 p-3 text-sm rounded-xl text-center bg-rose-950 text-rose-300 border-rose-800/60';
          resultDiv.textContent = res.message;
        }
      })
      .catch(err => {
        submitBtn.disabled = false;
        submitBtn.textContent = '同步數據至雲端資料庫';
        resultDiv.classList.remove('hidden');
        resultDiv.className = 'mt-4 p-3 text-sm rounded-xl text-center bg-rose-950 text-rose-300 border-rose-800/60';
        resultDiv.textContent = '傳輸失敗: ' + err.message;
      });
    }
  </script>
</body>
</html>
